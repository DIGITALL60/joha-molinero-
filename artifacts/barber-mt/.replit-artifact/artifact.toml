kind = "web"
previewPath = "/"
title = "Barber M.T"
version = "1.0.0"
id = "artifacts/barber-mt"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20118

[services.development]
run = "pnpm --filter @workspace/barber-mt run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/barber-mt", "run", "build" ]
publicDir = "artifacts/barber-mt/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20118"
BASE_PATH = "/"
